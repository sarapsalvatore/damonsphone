<html>
    <head>
        <link rel="stylesheet" href="style.css" />

        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />

        <title>Damon's Phone - Phone</title>
    </head>
    <body>
        <div class="phone-wrapper">
            <div class="phone">
                <div class="status-bar">
                    <div class="data">
                        <div class="box box-1"></div>
                        <div class="box box-2"></div>
                        <div class="box box-3"></div>
                        <div class="box box-4"></div>
                    </div>

                    <span class="network-type">5G</span>

                    <div class="battery-container">
                        <div class="battery">
                            <div class="battery-level"></div>
                            <span class="battery-percentage-label">81</span>
                        </div>
                        <div class="battery-end"></div>
                    </div>
                </div>

                <span id="date" class="lock-screen-date"></span>
                <span id="time" class="lock-screen-time"></span>

                <!-- SWIPE TEXT -->
                <div id="swipeScreen" class="swipe-screen" onclick="swipeUp()">Swipe up ↑</div>

                <!-- PIN SCREEN -->
                <div id="pinScreen" class="pin-screen">
                    <div class="dots">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>

                    <div class="keypad">
                        <button onclick="press(1)">1</button>
                        <button onclick="press(2)">2</button>
                        <button onclick="press(3)">3</button>

                        <button onclick="press(4)">4</button>
                        <button onclick="press(5)">5</button>
                        <button onclick="press(6)">6</button>

                        <button onclick="press(7)">7</button>
                        <button onclick="press(8)">8</button>
                        <button onclick="press(9)">9</button>

                        <div></div>
                        <button onclick="press(0)">0</button>
                        <div></div>
                    </div>

                    <!-- bottom left + right -->
                    <div class="bottom-actions">
                        <span onclick="emergency()">Emergency</span>
                        <span onclick="cancel()">Delete</span>
                    </div>
                </div>

                <!-- HOME SCREEN -->
                <div id="homeScreen" class="home-screen">
                    <div class="home-screen-top">
                        <!-- WEATHER -->
                        <div class="weather-widget">
                            <span class="weather-title">Košice</span>
                            <span class="weather-temp">24°</span>
                            <span class="weather-desc">Sunny</span>
                        </div>

                        <!-- CALENDAR -->
                        <div class="calendar-widget">
                            <span class="calendar-day">SUNDAY</span>
                            <span class="calendar-date">17</span>
                        </div>
                    </div>

                    <!-- APPS -->
                    <div class="apps-grid">
                        <!-- COLUMN 1 -->
                        <div class="app-column">
                            <div class="app app-instagram">
                                <i class="bi bi-instagram app-icon"></i>
                            </div>

                            <div class="app">
                                <i class="bi bi-camera-fill app-icon"></i>
                            </div>

                            <div class="app green-app">
                                <i class="bi bi-telephone-fill app-icon app-icon-white"></i>
                            </div>
                        </div>

                        <!-- COLUMN 2 -->
                        <div class="app-column">
                            <div class="app">
                                <i class="bi bi-whatsapp app-icon"></i>
                            </div>

                            <div class="app">
                                <i class="bi bi-images app-icon"></i>
                            </div>

                            <div class="app app-compass">
                                <i class="bi bi-compass app-icon app-icon-white"></i>
                            </div>
                        </div>

                        <!-- COLUMN 3 -->
                        <div class="app-column">
                            <div class="app">
                                <i class="bi bi-snapchat app-icon"></i>
                            </div>

                            <div class="app">
                                <i class="bi bi-envelope-fill app-icon"></i>
                            </div>

                            <div class="app green-app">
                                <i class="bi bi-chat-fill app-icon app-icon-white"></i>
                            </div>
                        </div>

                        <!-- COLUMN 4 -->
                        <div class="app-column last-column">
                            <div class="app">
                                <i class="bi bi-messenger app-icon"></i>
                            </div>

                            <div class="app app-music">
                                <i class="bi bi-music-note-beamed app-icon app-icon-white"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- JAVASCRIPT -->
        <script src="js/scalePhone.js"></script>
        <script src="js/lockScreen.js"></script>
    </body>
</html>
